<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body>
    <div class="header">
    <img src="{{ STATIC_URL }}img/frame1.png" alt="Logo" />

    <div class="header-links">
        <a href="/" class="header-link">Все статьи</a>
        <a href="/registration/" class="header-link">Регистрация</a>
        <a href="/login/" class="header-link">Вход</a>
    </div>
</div>

    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <h2 class="post-title">
                <a href="{% url articles.views.get_article article_id=post.id %}">{{ post.title }}</a>
            </h2>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
