{% load staticfiles %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - создать статью</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
    <link rel="stylesheet" href="{{ STATIC_URL }}css/create_post.css">
</head>
<body class="article">
    <div class="header">
        <img src="{{ STATIC_URL }}img/frame1.png" alt="Logo" />

        <div class="header-links">
            <a href="/" class="header-link">Все статьи</a>
            {% if user.is_authenticated %}
                <span class="header-link">{{ user.username }}</span>
                <a href="/article/new/" class="header-link">Написать статью</a>
                <a href="/logout/" class="header-link">Выход</a>
            {% else %}
                <a href="/registration/" class="header-link">Регистрация</a>
                <a href="/login/" class="header-link">Вход</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1>Написать статью</h1>
        <form method="POST">{% csrf_token %}
            <input type="text" name="title" placeholder="Название статьи" value="{{ form.title }}">
            <textarea name="text" placeholder="Текст статьи">{{ form.text }}</textarea>
            <input type="submit" value="Сохранить">
        </form>
        {% if form.errors %}
            <p style="color:red">{{ form.errors }}</p>
        {% endif %}
    </div>
</body>
</html>
