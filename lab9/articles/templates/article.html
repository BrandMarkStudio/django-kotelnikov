<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="{{ STATIC_URL }}img/frame1.png" alt="Logo" />

        <div class="header-links">
            <a href="/" class="header-link">Все статьи</a>
            {% if user.is_authenticated %}
                <span class="header-link">{{ user.username }}</span>
                <a href="/article/new/" class="header-link">Написать статью</a>
                <a href="/logout/" class="header-link">Выход</a>
            {% else %}
                <a href="/registration/" class="header-link">Регистрация</a>
                <a href="/login/" class="header-link">Вход</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1 class="article-title">{{ post.title }}</h1>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
    </div>
</body>
</html>
