{% load staticfiles %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - Вход</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="{{ STATIC_URL }}img/frame1.png" alt="Logo" />

        <div class="header-links">
            <a href="/" class="header-link">Все статьи</a>
            {% if user.is_authenticated %}
                <span class="header-link">{{ user.username }}</span>
                <a href="/article/new/" class="header-link">Написать статью</a>
                <a href="/logout/" class="header-link">Выход</a>
            {% else %}
                <a href="/registration/" class="header-link">Регистрация</a>
                <a href="/login/" class="header-link">Вход</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1>Вход на сайт</h1>
        <form method="POST">{% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <input type="text" name="username" placeholder="Имя пользователя">
            <input type="password" name="password" placeholder="Пароль">
            <input type="submit" value="Войти">
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
